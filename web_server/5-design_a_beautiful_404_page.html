<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Not Found</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f9f7f4;
        color: #1a1a1a;
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .wrapper {
        max-width: 520px;
        width: 100%;
        text-align: left;
      }

      .rule {
        width: 40px;
        height: 1px;
        background: #1a1a1a;
        margin-bottom: 2.5rem;
      }

      .number {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(6rem, 20vw, 10rem);
        line-height: 1;
        letter-spacing: -0.03em;
        color: #1a1a1a;
        margin-bottom: 0.25rem;
      }

      .tagline {
        font-family: 'DM Serif Display', serif;
        font-style: italic;
        font-size: clamp(1rem, 3vw, 1.35rem);
        color: #555;
        margin-bottom: 2rem;
        line-height: 1.4;
      }

      .description {
        font-size: 0.9rem;
        font-weight: 300;
        color: #777;
        line-height: 1.7;
        margin-bottom: 2.5rem;
        max-width: 380px;
      }

      .actions {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        padding: 0.65rem 1.4rem;
        border-radius: 2px;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .btn-primary {
        background: #1a1a1a;
        color: #f9f7f4;
      }
      .btn-primary:hover {
        background: #333;
      }

      .btn-ghost {
        color: #777;
        border: 1px solid #ddd;
        background: transparent;
      }
      .btn-ghost:hover {
        border-color: #999;
        color: #333;
      }

      .footer {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.7rem;
        color: #bbb;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="rule"></div>
      <div class="number">404</div>
      <p class="tagline">Ceci n'est pas une page.</p>
      <p class="description">
        The page you're looking for doesn't exist, was moved, or never was.
        Perhaps it's hiding somewhere between the internet and your imagination.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Go home</a>
        <a class="btn btn-ghost" href="javascript:history.back()">Go back</a>
      </div>
    </div>

    <div class="footer">maljazz.tech</div>
  </body>
</html>
